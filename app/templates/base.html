<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>

  <!-- Tailwind Play CDN (für kleine Self-Host-Projekte okay; für riesige Seiten lieber builden) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Tiny polish */
    .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.75); }
    /* Global focus visible accessibility */
    *:focus-visible { outline: 2px solid #22d3ee; outline-offset: 2px; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-slate-900 focus:text-cyan-400 focus:outline-none">Skip to content</a>
  <header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/80 glass">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-cyan-400 to-fuchsia-500"></div>
        <div class="leading-tight">
          <div class="font-semibold">{{ app_name }}</div>
          <div class="text-xs text-slate-300">Self‑hosted 3D‑Auftrags‑Queue</div>
        </div>
      </a>

      <div class="flex items-center gap-2">
        {% if request.session.get("is_admin") %}
          <a href="/admin" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/15 border border-white/10 text-sm">Admin</a>
          <form method="post" action="/admin/logout">
            <button class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/15 border border-white/10 text-sm" type="submit">Logout</button>
          </form>
        {% else %}
          <a href="/admin/login" class="px-3 py-2 rounded-lg bg-white/10 hover:bg-white/15 border border-white/10 text-sm">Admin Login</a>
        {% endif %}
      </div>
    </div>
  </header>

  <main id="main-content" class="mx-auto max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mx-auto max-w-6xl px-4 pb-10 text-xs text-slate-400">
    <div class="border-t border-white/10 pt-6">
      <div>Made for practical humans. The universe remains chaotic.</div>
    </div>
  </footer>

  <script>
    // Global form submission handler for better UX
    document.addEventListener('submit', function(e) {
      if (e.defaultPrevented) return;

      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]:not([disabled]), button:not([type="button"]):not([disabled])');

      if (submitBtn) {
        // Use setTimeout to ensure the form actually submits before we disable the button
        setTimeout(() => {
          submitBtn.disabled = true;
          submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

          // Add inline spinner if it doesn't already have one
          if (!submitBtn.querySelector('.animate-spin')) {
            const originalText = submitBtn.innerHTML;
            submitBtn.setAttribute('aria-live', 'polite');
            submitBtn.innerHTML = `
              <div class="flex items-center justify-center gap-2">
                <svg class="animate-spin h-4 w-4 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Lädt...</span>
              </div>
            `;
          }
        }, 0);
      }
    });
  </script>
</body>
</html>
